<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sad Sunday Club — Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 640px;
        height: 640px;
        background-color: #fdf6f0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 60px;
      }

      .content {
        position: relative;
        z-index: 2;
        text-align: left;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .title {
        font-family: 'Lora', serif;
        font-size: 42px;
        font-weight: 400;
        color: #6b4e4d;
        line-height: 1.2;
        letter-spacing: 0.01em;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: #c49a8a;
      }

      .tagline {
        font-family: 'Inter', sans-serif;
        font-weight: 300;
        font-size: 13px;
        color: #9b7170;
        letter-spacing: 0.12em;
        text-transform: lowercase;
      }

      .url {
        font-family: 'Inter', sans-serif;
        font-weight: 300;
        font-size: 11px;
        color: #c49a8a;
        letter-spacing: 0.08em;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="title">sad sunday club</div>
        <div class="divider"></div>
        <div class="tagline">a quiet place for people who feel things deeply</div>
        <div class="url">sadsundayclub.com</div>
      </div>
    </div>
  </body>
</html>
